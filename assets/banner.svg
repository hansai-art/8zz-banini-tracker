<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="50%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g fill="#21262D" opacity="0.6">
    <circle cx="900" cy="120" r="2"/>
    <circle cx="940" cy="120" r="2"/>
    <circle cx="980" cy="120" r="2"/>
    <circle cx="1020" cy="120" r="2"/>
    <circle cx="1060" cy="120" r="2"/>
    <circle cx="1100" cy="120" r="2"/>
    <circle cx="1140" cy="120" r="2"/>
    <circle cx="900" cy="160" r="2"/>
    <circle cx="940" cy="160" r="2"/>
    <circle cx="980" cy="160" r="2"/>
    <circle cx="1020" cy="160" r="2"/>
    <circle cx="1060" cy="160" r="2"/>
    <circle cx="1100" cy="160" r="2"/>
    <circle cx="1140" cy="160" r="2"/>
    <circle cx="900" cy="200" r="2"/>
    <circle cx="940" cy="200" r="2"/>
    <circle cx="980" cy="200" r="2"/>
    <circle cx="1020" cy="200" r="2"/>
    <circle cx="1060" cy="200" r="2"/>
    <circle cx="1100" cy="200" r="2"/>
    <circle cx="1140" cy="200" r="2"/>
  </g>

  <!-- Glow background -->
  <ellipse cx="640" cy="300" rx="500" ry="250" fill="url(#glow)"/>

  <!-- Candlestick chart decoration -->
  <g transform="translate(780, 220)" opacity="0.35">
    <!-- Green candle -->
    <line x1="40" y1="60" x2="40" y2="140" stroke="#10B981" stroke-width="2"/>
    <rect x="30" y="80" width="20" height="40" fill="#10B981" rx="2"/>
    <!-- Red candle -->
    <line x1="80" y1="40" x2="80" y2="130" stroke="#EF4444" stroke-width="2"/>
    <rect x="70" y="50" width="20" height="60" fill="#EF4444" rx="2"/>
    <!-- Green candle -->
    <line x1="120" y1="30" x2="120" y2="120" stroke="#10B981" stroke-width="2"/>
    <rect x="110" y="50" width="20" height="50" fill="#10B981" rx="2"/>
    <!-- Red candle (big drop) -->
    <line x1="160" y1="20" x2="160" y2="160" stroke="#EF4444" stroke-width="2"/>
    <rect x="150" y="40" width="20" height="100" fill="#EF4444" rx="2"/>
    <!-- Green candle (reversal) -->
    <line x1="200" y1="60" x2="200" y2="170" stroke="#10B981" stroke-width="2"/>
    <rect x="190" y="90" width="20" height="60" fill="#10B981" rx="2"/>
    <!-- Arrow reversal indicator -->
    <path d="M220,80 Q260,20 300,70" stroke="#F59E0B" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>
    <polygon points="295,60 305,72 292,75" fill="#F59E0B"/>
  </g>

  <!-- Accent line -->
  <rect x="120" y="330" width="240" height="4" rx="2" fill="url(#accent)"/>

  <!-- Title -->
  <text x="120" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#F0F6FC">banini-tracker</text>

  <!-- Subtitle -->
  <text x="120" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#8B949E">Reverse-indicator goddess tracker.</text>
  <text x="120" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#8B949E">AI-powered contrarian signal from social posts.</text>

  <!-- Tags -->
  <g transform="translate(120, 470)">
    <rect x="0" y="0" width="100" height="32" rx="16" fill="#21262D"/>
    <text x="50" y="21" font-family="ui-monospace, monospace" font-size="14" fill="#8B949E" text-anchor="middle">Threads</text>
    <rect x="116" y="0" width="100" height="32" rx="16" fill="#21262D"/>
    <text x="166" y="21" font-family="ui-monospace, monospace" font-size="14" fill="#8B949E" text-anchor="middle">Facebook</text>
    <rect x="232" y="0" width="60" height="32" rx="16" fill="#21262D"/>
    <text x="262" y="21" font-family="ui-monospace, monospace" font-size="14" fill="#8B949E" text-anchor="middle">LLM</text>
    <rect x="308" y="0" width="100" height="32" rx="16" fill="#21262D"/>
    <text x="358" y="21" font-family="ui-monospace, monospace" font-size="14" fill="#8B949E" text-anchor="middle">Telegram</text>
  </g>

  <!-- Author -->
  <text x="120" y="560" font-family="ui-monospace, monospace" font-size="20" fill="#6E7681">by @cablate</text>
</svg>
